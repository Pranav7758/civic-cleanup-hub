openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Civic Cleanup Hub API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: profiles
  - name: reports
  - name: wallet
  - name: training
  - name: scrap
  - name: donations
  - name: events
  - name: feed
  - name: notifications
  - name: messages
  - name: admin
  - name: dashboard

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/signup:
    post:
      operationId: signUp
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpBody"
      responses:
        "200":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/signin:
    post:
      operationId: signIn
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignInBody"
      responses:
        "200":
          description: Signed in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/signout:
    post:
      operationId: signOut
      tags: [auth]
      responses:
        "200":
          description: Signed out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"

  # PROFILES
  /profiles/me:
    get:
      operationId: getMyProfile
      tags: [profiles]
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
    patch:
      operationId: updateMyProfile
      tags: [profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  /profiles/{userId}:
    get:
      operationId: getProfile
      tags: [profiles]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"

  # WASTE REPORTS
  /reports:
    get:
      operationId: getReports
      tags: [reports]
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: citizenId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Reports list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportsResponse"
    post:
      operationId: createReport
      tags: [reports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReportBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"

  /reports/{id}:
    get:
      operationId: getReport
      tags: [reports]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"
    patch:
      operationId: updateReport
      tags: [reports]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReportBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportResponse"

  /reports/pending-verification:
    get:
      operationId: getPendingVerificationReports
      tags: [reports]
      responses:
        "200":
          description: Reports pending peer verification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReportsResponse"

  /reports/verify:
    post:
      operationId: verifyReport
      tags: [reports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyReportBody"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # WALLET
  /wallet/score:
    get:
      operationId: getCleanlinessScore
      tags: [wallet]
      responses:
        "200":
          description: Cleanliness score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CleanlinessScoreResponse"

  /wallet/transactions:
    get:
      operationId: getWalletTransactions
      tags: [wallet]
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionsResponse"

  /wallet/benefits:
    get:
      operationId: getGovernmentBenefits
      tags: [wallet]
      responses:
        "200":
          description: Benefits
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitsResponse"

  /wallet/redeem-items:
    get:
      operationId: getRedeemItems
      tags: [wallet]
      responses:
        "200":
          description: Redeemable items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemItemsResponse"

  /wallet/redeem:
    post:
      operationId: redeemItem
      tags: [wallet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemBody"
      responses:
        "200":
          description: Redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /wallet/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [wallet]
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaderboardResponse"

  # TRAINING
  /training/modules:
    get:
      operationId: getTrainingModules
      tags: [training]
      responses:
        "200":
          description: Training modules
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModulesResponse"

  /training/progress:
    get:
      operationId: getTrainingProgress
      tags: [training]
      responses:
        "200":
          description: Training progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingProgressResponse"
    post:
      operationId: updateTrainingProgress
      tags: [training]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainingProgressBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingProgressItemResponse"

  # SCRAP
  /scrap/prices:
    get:
      operationId: getScrapPrices
      tags: [scrap]
      responses:
        "200":
          description: Scrap prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapPricesResponse"

  /scrap/listings:
    get:
      operationId: getScrapListings
      tags: [scrap]
      parameters:
        - name: citizenId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Scrap listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapListingsResponse"
    post:
      operationId: createScrapListing
      tags: [scrap]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateScrapListingBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapListingResponse"

  /scrap/listings/{id}:
    get:
      operationId: getScrapListing
      tags: [scrap]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapListingResponse"
    patch:
      operationId: updateScrapListing
      tags: [scrap]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScrapListingBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapListingResponse"

  # DONATIONS
  /donations:
    get:
      operationId: getDonations
      tags: [donations]
      parameters:
        - name: citizenId
          in: query
          schema:
            type: string
        - name: ngoId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Donations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationsResponse"
    post:
      operationId: createDonation
      tags: [donations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonationBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationResponse"

  /donations/{id}:
    patch:
      operationId: updateDonation
      tags: [donations]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDonationBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DonationResponse"

  # COMMUNITY EVENTS
  /events:
    get:
      operationId: getCommunityEvents
      tags: [events]
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventsResponse"
    post:
      operationId: createEvent
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"

  /events/{id}/register:
    post:
      operationId: registerForEvent
      tags: [events]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /events/my-registrations:
    get:
      operationId: getMyEventRegistrations
      tags: [events]
      responses:
        "200":
          description: My registrations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventRegistrationsResponse"

  # COMMUNITY FEED
  /feed:
    get:
      operationId: getCommunityFeed
      tags: [feed]
      responses:
        "200":
          description: Feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedResponse"
    post:
      operationId: createFeedPost
      tags: [feed]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedPostBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedPostResponse"

  # NOTIFICATIONS
  /notifications:
    get:
      operationId: getNotifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      responses:
        "200":
          description: All marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # MESSAGES
  /messages/{referenceId}:
    get:
      operationId: getMessages
      tags: [messages]
      parameters:
        - name: referenceId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagesResponse"

  /messages:
    post:
      operationId: sendMessage
      tags: [messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  # DUSTBIN
  /dustbin/collections:
    get:
      operationId: getDustbinCollections
      tags: [reports]
      responses:
        "200":
          description: Collections
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DustbinCollectionsResponse"
    post:
      operationId: createDustbinCollection
      tags: [reports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDustbinCollectionBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # DASHBOARD SUMMARY
  /dashboard/citizen:
    get:
      operationId: getCitizenDashboard
      tags: [dashboard]
      responses:
        "200":
          description: Citizen dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CitizenDashboardResponse"

  /dashboard/worker:
    get:
      operationId: getWorkerDashboard
      tags: [dashboard]
      responses:
        "200":
          description: Worker dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkerDashboardResponse"

  /dashboard/ngo:
    get:
      operationId: getNgoDashboard
      tags: [dashboard]
      responses:
        "200":
          description: NGO dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NgoDashboardResponse"

  /dashboard/admin:
    get:
      operationId: getAdminDashboard
      tags: [dashboard]
      responses:
        "200":
          description: Admin dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardResponse"

  # ADMIN
  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"

  /admin/users/{id}/roles:
    patch:
      operationId: updateUserRoles
      tags: [admin]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRolesBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /admin/training-modules:
    post:
      operationId: createTrainingModule
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainingModuleBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainingModuleResponse"

  /admin/redeem-items:
    post:
      operationId: createRedeemItem
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRedeemItemBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemItemResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
        message:
          type: ["string", "null"]
        pointsEarned:
          type: ["integer", "null"]
      required: [ok]

    # AUTH
    SignUpBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
        fullName:
          type: string
        role:
          type: string
        phone:
          type: ["string", "null"]
      required: [email, password, fullName, role]

    SignInBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthUser:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        fullName:
          type: string
      required: [id, email, fullName]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        token:
          type: string
        roles:
          type: array
          items:
            type: string
        redirectTo:
          type: string
      required: [user, token, roles, redirectTo]

    MeResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        roles:
          type: array
          items:
            type: string
      required: [user, roles]

    # PROFILES
    Profile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        fullName:
          type: string
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        ward:
          type: ["string", "null"]
        dustbinCode:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, userId, fullName]

    ProfileResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/Profile"
      required: [data]

    UpdateProfileBody:
      type: object
      properties:
        fullName:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        address:
          type: string
        city:
          type: string
        ward:
          type: string

    # WASTE REPORTS
    WasteReport:
      type: object
      properties:
        id:
          type: string
        citizenId:
          type: string
        imageUrl:
          type: ["string", "null"]
        wasteType:
          type: string
        description:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        address:
          type: ["string", "null"]
        status:
          type: string
        assignedWorkerId:
          type: ["string", "null"]
        completionImageUrl:
          type: ["string", "null"]
        rewardPoints:
          type: ["integer", "null"]
        priority:
          type: ["string", "null"]
        reporterName:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, citizenId, wasteType, status, createdAt]

    ReportResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/WasteReport"
      required: [data]

    ReportsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WasteReport"
      required: [data]

    CreateReportBody:
      type: object
      properties:
        imageUrl:
          type: string
        wasteType:
          type: string
        description:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        priority:
          type: string
      required: [wasteType]

    UpdateReportBody:
      type: object
      properties:
        status:
          type: string
        assignedWorkerId:
          type: string
        completionImageUrl:
          type: string
        priority:
          type: string

    VerifyReportBody:
      type: object
      properties:
        reportId:
          type: string
        isLegit:
          type: boolean
      required: [reportId, isLegit]

    # WALLET
    CleanlinessScore:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        score:
          type: integer
        tier:
          type: string
        totalReports:
          type: ["integer", "null"]
        totalScrapSold:
          type: ["integer", "null"]
        totalDonations:
          type: ["integer", "null"]
        totalEvents:
          type: ["integer", "null"]
      required: [id, userId, score, tier]

    CleanlinessScoreResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/CleanlinessScore"
      required: [data]

    WalletTransaction:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          type: string
        action:
          type: string
        points:
          type: integer
        referenceId:
          type: ["string", "null"]
        referenceType:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, userId, type, action, points, createdAt]

    TransactionsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"
      required: [data]

    GovernmentBenefit:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        benefitType:
          type: string
        discountPercent:
          type: ["integer", "null"]
        status:
          type: string
        provider:
          type: ["string", "null"]
        couponCode:
          type: ["string", "null"]
        validUntil:
          type: ["string", "null"]
        createdAt:
          type: string
      required: [id, userId, benefitType, status, createdAt]

    BenefitsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/GovernmentBenefit"
      required: [data]

    RedeemItem:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]
        pointsCost:
          type: integer
        stock:
          type: ["integer", "null"]
        imageEmoji:
          type: ["string", "null"]
        active:
          type: ["boolean", "null"]
      required: [id, title, pointsCost]

