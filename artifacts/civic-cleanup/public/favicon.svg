<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1b6b3a"/>
      <stop offset="55%"  stop-color="#0d4a28"/>
      <stop offset="100%" stop-color="#021a0e"/>
    </linearGradient>
    <radialGradient id="hl" cx="28%" cy="22%" r="55%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.28)"/>
      <stop offset="70%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <radialGradient id="glow" cx="75%" cy="80%" r="50%">
      <stop offset="0%"   stop-color="rgba(16,185,129,0.2)"/>
      <stop offset="100%" stop-color="rgba(16,185,129,0)"/>
    </radialGradient>
    <linearGradient id="top" x1="18" y1="26" x2="46" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="left" x1="18" y1="26" x2="18" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="right" x1="46" y1="26" x2="46" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#059669"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="leaf" x1="40" y1="8" x2="54" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="sweep" x1="10" y1="56" x2="54" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.4)"/>
    </linearGradient>
    <filter id="shd" x="-20%" y="-15%" width="150%" height="150%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
  </defs>

  <!-- Drop shadow -->
  <rect width="62" height="62" rx="15" fill="rgba(0,0,0,0.38)" transform="translate(3,5)" filter="url(#shd)"/>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#hl)"/>
  <rect width="64" height="64" rx="16" fill="url(#glow)"/>
  <rect x="0.8" y="0.8" width="62.4" height="62.4" rx="15.2" fill="none" stroke="rgba(255,255,255,0.16)" stroke-width="1.2"/>

  <!-- 3D Cube shadow -->
  <polygon points="32,21 18,29 32,37 46,29" fill="rgba(0,0,0,0.18)" transform="translate(2,4)"/>

  <!-- Left face -->
  <polygon points="18,26 18,42 32,50 32,34" fill="url(#left)"/>
  <line x1="18" y1="26" x2="18" y2="42" stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- Right face -->
  <polygon points="46,26 46,42 32,50 32,34" fill="url(#right)"/>
  <line x1="46" y1="26" x2="46" y2="42" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>

  <!-- Top face -->
  <polygon points="32,18 18,26 32,34 46,26" fill="url(#top)"/>
  <ellipse cx="26" cy="23" rx="4" ry="2.5" fill="rgba(255,255,255,0.35)" transform="rotate(-15,26,23)"/>

  <!-- Cube edges -->
  <polyline points="18,26 32,18 46,26 32,34 18,26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
  <line x1="32" y1="34" x2="32" y2="50" stroke="rgba(0,0,0,0.15)" stroke-width="0.6"/>

  <!-- Eco leaf -->
  <path d="M45 10 C41 7 36 9 35 14 C34 19 38 23 42 20 C40 24 37 26 35 26 C38 27 44 24 46 18 C47 14 47 11 45 10 Z" fill="url(#leaf)" opacity="0.95"/>
  <path d="M39 11 C38 16 37 21 36 26" stroke="rgba(6,78,59,0.35)" stroke-width="0.7" stroke-linecap="round" fill="none"/>
  <path d="M36 26 Q38 29 41 28" stroke="rgba(110,231,183,0.6)" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Sweep arc -->
  <path d="M10 57 Q21 50 32 49 Q43 50 54 57" stroke="url(#sweep)" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <circle cx="10" cy="57" r="1.8" fill="rgba(255,255,255,0.55)"/>
  <circle cx="54" cy="57" r="1.8" fill="rgba(255,255,255,0.55)"/>
  <circle cx="32" cy="49" r="1.2" fill="rgba(110,231,183,0.7)"/>

  <!-- Sparkle -->
  <path d="M11 15 L12 12 L13 15 L16 16 L13 17 L12 20 L11 17 L8 16 Z" fill="rgba(255,255,255,0.55)" opacity="0.7"/>
  <circle cx="47" cy="43" r="1.2" fill="rgba(255,255,255,0.25)"/>
  <circle cx="17" cy="43" r="1.0" fill="rgba(255,255,255,0.18)"/>
</svg>
