<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c3318"/>
      <stop offset="60%" stop-color="#1b5e20"/>
      <stop offset="100%" stop-color="#082010"/>
    </linearGradient>
    <radialGradient id="hl" cx="25%" cy="20%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="bin" x1="18" y1="28" x2="46" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="55%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="lid" x1="16" y1="22" x2="48" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#66bb6a"/>
    </linearGradient>
    <linearGradient id="lleaf" x1="16" y1="12" x2="30" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b9f6ca"/>
      <stop offset="100%" stop-color="#69f0ae"/>
    </linearGradient>
    <linearGradient id="rleaf" x1="34" y1="8" x2="48" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
    <linearGradient id="arc" x1="14" y1="56" x2="50" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(165,214,167,0)"/>
      <stop offset="50%" stop-color="rgba(165,214,167,0.55)"/>
      <stop offset="100%" stop-color="rgba(165,214,167,0)"/>
    </linearGradient>
  </defs>

  <!-- Background squircle -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#hl)"/>
  <rect x="0.8" y="0.8" width="62.4" height="62.4" rx="15.2" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="1.2"/>

  <!-- Bin body (trapezoid) -->
  <polygon points="20,27.5 44,27.5 41.5,51 22.5,51" fill="url(#bin)"/>
  <line x1="20" y1="27.5" x2="22.5" y2="51" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <line x1="44" y1="27.5" x2="41.5" y2="51" stroke="rgba(0,0,0,0.18)" stroke-width="0.8"/>
  <line x1="27.5" y1="28.5" x2="26.2" y2="50" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="37.5" y1="28.5" x2="38.8" y2="50" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Recycling symbol on bin -->
  <g opacity="0.5">
    <path d="M32,31.5 C35.5,31.5 38,33.5 39,36.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M39,36.5 C39.5,39.5 38,41.5 35.5,42" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M35.5,42 C33,43 29,42.5 27.5,40 C26.5,38 27,35.5 28,34" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <path d="M28,34 C29.5,32 30.5,31.5 32,31.5" stroke="rgba(255,255,255,0.6)" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    <polygon points="32,34 30,31 34,31" fill="rgba(255,255,255,0.65)"/>
    <polygon points="38.5,41 36,39 39.5,39.5" fill="rgba(255,255,255,0.65)"/>
    <polygon points="25.5,40 24.5,37 27.5,38.5" fill="rgba(255,255,255,0.65)"/>
  </g>

  <!-- Bin lid -->
  <rect x="17" y="22.5" width="30" height="5.5" rx="2.5" fill="url(#lid)"/>
  <rect x="17" y="22.5" width="30" height="2" rx="2" fill="rgba(255,255,255,0.3)"/>

  <!-- Handle -->
  <rect x="26.5" y="18.5" width="11" height="4.5" rx="2.2" fill="rgba(255,255,255,0.82)"/>
  <rect x="27.5" y="19.2" width="9" height="1.5" rx="0.75" fill="rgba(255,255,255,0.5)"/>

  <!-- Plant stem -->
  <line x1="32" y1="18.5" x2="32" y2="7" stroke="#a5d6a7" stroke-width="2" stroke-linecap="round"/>

  <!-- Left leaf -->
  <path d="M32,15 C28,11 21,12 23,17 C24.5,20 30,18 32,15 Z" fill="url(#lleaf)" opacity="0.95"/>
  <path d="M31,14.5 C27.5,15.5 25,17 24,18.5" stroke="rgba(6,78,59,0.3)" stroke-width="0.7" stroke-linecap="round" fill="none"/>

  <!-- Right leaf -->
  <path d="M32,11.5 C36,7.5 43,8.5 41,13.5 C39.5,17 34,15 32,11.5 Z" fill="url(#rleaf)" opacity="0.92"/>
  <path d="M32.5,11.5 C36,12.5 38.5,13.5 40,15" stroke="rgba(6,78,59,0.28)" stroke-width="0.7" stroke-linecap="round" fill="none"/>

  <!-- Bud -->
  <circle cx="32" cy="6.5" r="2" fill="#b9f6ca" opacity="0.9"/>
  <circle cx="32" cy="6.5" r="1" fill="rgba(255,255,255,0.6)"/>

  <!-- Renewal arc -->
  <path d="M16,57.5 Q32,53.5 48,57.5" stroke="url(#arc)" stroke-width="1.8" stroke-linecap="round" fill="none"/>

  <!-- Sparkle -->
  <path d="M10,13 L11,10 L12,13 L15,14 L12,15 L11,18 L10,15 L7,14 Z" fill="rgba(255,255,255,0.52)" opacity="0.65"/>
  <circle cx="49" cy="17" r="1.3" fill="rgba(165,214,167,0.45)"/>
</svg>
